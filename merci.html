<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci - Sina & Prestige</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      font-family:'Montserrat',sans-serif;
      background:#f5f5f6;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .merci-container{
      max-width:700px;
      width:90%;
      background:white;
      border-radius:20px;
      padding:50px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.08);
    }

    .merci-logo{
      width:140px;
      margin-bottom:30px;
    }

    h1{
      color:#2c4f73;
      font-size:36px;
      margin-bottom:20px;
    }

    p{
      color:#5d7390;
      line-height:1.7;
      margin-bottom:35px;
      font-size:16px;
    }

    .home-btn{
      display:inline-block;
      background:#2c4f73;
      color:white;
      text-decoration:none;
      padding:14px 30px;
      border-radius:30px;
      transition:0.3s;
    }

    .home-btn:hover{
      transform:translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="merci-container">

    <img src="images/logo.png" alt="Sina & Prestige" class="merci-logo">

    <h1>Merci pour votre demande</h1>

    <p>
      Votre message a bien été transmis à notre équipe.
      Nous étudierons votre demande et reviendrons vers vous dans les meilleurs délais.
      <br><br>
      Délai moyen de réponse : 24 à 48 heures ouvrées.
    </p>

    <a href="index.html" class="home-btn">
      Retour à l'accueil
    </a>

  </div>

</body>
</html>
